name: Build extip-rust

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  check:
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          pacman -Sy --noconfirm cargo rust git base-devel sudo

      - name: Create build user
        run: |
          useradd -m builder
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Run cargo check
        run: |
          sudo -u builder bash -c 'cd apps/extip-rust && cargo check'

  test:
    runs-on: ubuntu-latest
    container: archlinux:latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          pacman -Sy --noconfirm cargo rust git base-devel sudo

      - name: Create build user
        run: |
          useradd -m builder
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Run tests
        run: |
          sudo -u builder bash -c 'cd apps/extip-rust && cargo test'

  build:
    runs-on: ubuntu-latest
    container: archlinux:latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          pacman -Sy --noconfirm cargo rust git base-devel sudo

      - name: Create build user
        run: |
          useradd -m builder
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Get version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version = ' apps/extip-rust/Cargo.toml | sed 's/version = "\(.*\)"/\1/' | tr -d '\n')
          if [ -z "$VERSION" ]; then
            echo "Error: Could not extract version from Cargo.toml"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build package
        run: |
          sudo -u builder bash -c 'cd apps/extip-rust && makepkg --noconfirm --nodeps --skippgpcheck -f'

      - name: Create Release and Upload Assets
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const pkgDir = 'apps/extip-rust';

            // Create release
            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: 'extip-v${{ steps.version.outputs.version }}',
              name: 'extip-rust ${{ steps.version.outputs.version }}',
              draft: false,
              prerelease: false,
              generate_release_notes: true
            });

            // Upload assets from apps/extip-rust directory
            const files = fs.readdirSync(pkgDir);
            for (const file of files) {
              if (file.endsWith('.pkg.tar.zst')) {
                const assetPath = path.join(pkgDir, file);
                await github.rest.repos.uploadReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: release.data.id,
                  name: file,
                  data: fs.readFileSync(assetPath)
                });
                console.log(`Uploaded: ${file}`);
              }
            }
