language: "python"

project:
  title: "modelloader"
  description: "A tool to load models from various llm providers."

tasks:
  run:
    command: "uv run modelloader.py"
    inputs:
      - "modelloader.py"

  test:
    command: "uv run --with pytest --with click --with requests pytest tests/ -v"
    inputs:
      - "modelloader.py"
      - "tests/"
