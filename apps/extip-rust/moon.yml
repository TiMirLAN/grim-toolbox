$schema: "https://moonrepo.dev/schemas/project.json"

language: rust
layer: application
project:
  name: extip-rust
  description: |
    External IP service with socket-based client written in Rust.
stack: systems
tasks:
  run.service:
    command: cargo run --features dev-version -- service

  run.client:
    command: cargo run --features dev-version -- client

  lint:
    command: cargo clippy --fix --allow-dirty

  format:
    command: cargo fmt

  test:
    command: cargo test

  clean:
    command: cargo clean

  build:
    command: cargo build --release

  pkgbuild:
    command: "makepkg --nodeps --skippgpcheck -D ."

  version:
    command: cargo run --release --quiet -- --version

  changelog:
    script: "../../scripts/generate-changelog.sh"

  release:
    command:
      - cargo build --release
      - "../../scripts/generate-changelog.sh"
      - git add -A
      - git commit -m "~ version"
      - git tag -f "extip-v$(cargo run --release --quiet -- --version | cut -d' ' -f2)"
      - git push origin tag "extip-v$(cargo run --release --quiet -- --version | cut -d' ' -f2)" --force
    dependsOn:
      - build
