# hastuioctl — Event-to-command mapping
#
# Each event maps an MQTT topic + trigger to a list of Actions.
# Backward-compatible: single `action:` entry is auto-converted to `actions: [...]`.
#
# Trigger fields:
#   command: exact match on payload["command"]
#   text:    regex match on payload["params"]["text"]
#   (extra): any other field is forbidden by Pydantic (extra="forbid")
#
# Pydantic auto-validates the entire file: unknown keys, missing fields,
# type mismatches all raise ValidationError before the daemon starts.

events:

  # ── Playback control ───────────────────────────────────────────
  - topic: "ha/audio/command"
    trigger:
      command: "play"
    actions:
      - description: "Play / resume audio"
        command: "playerctl"
        args: ["play"]

  - topic: "ha/audio/command"
    trigger:
      command: "pause"
    actions:
      - description: "Pause playing audio"
        command: "playerctl"
        args: ["pause"]

  - topic: "ha/audio/command"
    trigger:
      command: "stop"
    actions:
      - description: "Stop audio playback"
        command: "playerctl"
        args: ["stop"]

  - topic: "ha/audio/command"
    trigger:
      command: "next"
    actions:
      - description: "Next track"
        command: "playerctl"
        args: ["next"]

  - topic: "ha/audio/command"
    trigger:
      command: "prev"
    actions:
      - description: "Previous track"
        command: "playerctl"
        args: ["previous"]

  - topic: "ha/audio/command"
    trigger:
      command: "play-pause"
    actions:
      - description: "Toggle play/pause"
        command: "playerctl"
        args: ["play-pause"]

  # ── Volume ─────────────────────────────────────────────────────
  - topic: "ha/audio/command"
    trigger:
      command: "volume"
    actions:
      - description: "Set volume percentage"
        command: "pactl"
        args:
          - "set-sink-volume"
          - "@DEFAULT_SINK@"
          - "{{ params }}"       # must be a number or "N%"

  - topic: "ha/audio/command"
    trigger:
      command: "volume-up"
    actions:
      - description: "Increase volume by delta"
        command: "pactl"
        args:
          - "set-sink-volume"
          - "@DEFAULT_SINK@"
          - "++{{ params | default 5 }}"

  - topic: "ha/audio/command"
    trigger:
      command: "volume-down"
    actions:
      - description: "Decrease volume by delta"
        command: "pactl"
        args:
          - "set-sink-volume"
          - "@DEFAULT_SINK@"
          - "--{{ params | default 5 }}"

  - topic: "ha/audio/command"
    trigger:
      command: "mute"
    actions:
      - description: "Toggle mute"
        command: "pactl"
        args: ["set-sink-mute", "@DEFAULT_SINK@", "toggle"]

  - topic: "ha/audio/command"
    trigger:
      command: "unmute"
    actions:
      - description: "Unmute"
        command: "pactl"
        args: ["set-sink-mute", "@DEFAULT_SINK@", "0"]

  # ── Play arbitrary URL ─────────────────────────────────────────
  - topic: "ha/audio/command"
    trigger:
      command: "play_url"
    actions:
      - description: "Play media URL on desktop via mpv"
        command: "mpv"
        args:
          - "--no-video"
          - "--volume=50"
          - "{{ params.url }}"

  # ── TTS / text-to-speak ────────────────────────────────────────
  - topic: "ha/audio/tts"
    trigger:
      text: "."                          # regex: match everything
    actions:
      - description: "Speak text via espeak or pico2wave"
        command: "espeak"
        args:
          - "{{ params.text }}"
        env:
          VOICE: "{{ params.voice | default 'default' }}"

  # ── Status reporting ───────────────────────────────────────────
  - topic: "ha/audio/status/subscribe"
    trigger:
      command: "status"
    actions:
      - command: "playerctl"
        args: ["metadata", "-f", "{{ '{{{{title}}}} | {{ '{{{{artist}}}} | {{ '{{{{status}}}}"]
        publish_reply_to: "ha/audio/status"

  - topic: "ha/audio/volume/subscribe"
    trigger:
      command: "volume_status"
    actions:
      - command: "pactl"
        args: ["get-sink-volume", "@DEFAULT_SINK@"]
        publish_reply_to: "ha/audio/volume_status"
